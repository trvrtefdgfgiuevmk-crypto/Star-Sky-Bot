<!DOCTYPE html>

    <style>

            margin: 0;

            background: #050505;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;

        .container { padding: 80px 20px; }

        .features { display: flex; justify-content: center; gap: 20px; margin-top: 50px; flex-wrap: wrap; }

        .card {
            background: #111;
            padding: 25px;
            border-radius: 8px;
            width: 250px;
            border: 1px solid #222;
            transition: 0.3s;
